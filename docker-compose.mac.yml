# =========================================================================
# Compose para macOS (Intel e Apple Silicon), voltado a DESENVOLVIMENTO.
#
# Diferenças em relação ao docker-compose.yml (padrão / Windows):
#   - Bind mounts do código (backend e frontend) para LIVE-RELOAD: editar um
#     arquivo no host reflete no container sem rebuild. No macOS os bind mounts
#     têm desempenho adequado; no Windows preferimos código embutido na imagem.
#   - Imagens multi-arch nativas: mysql:8.0 roda nativo em arm64 (M1/M2/M3),
#     sem emulação.
#
# Uso:
#   cp .env.example .env
#   docker compose -f docker-compose.mac.yml up --build
#
# O docker-compose.yml original permanece intacto para quem usa Windows/Linux
# ou quer o modo "imagem imutável".
# =========================================================================

services:
  db:
    image: mysql:8.0 # multi-arch: usa arm64 nativo no Apple Silicon
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-todo}
      MYSQL_USER: ${MYSQL_USER:-todo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-todo}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data_mac:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-only-change-me}
      DEBUG: ${DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      USE_SQLITE: "0"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-todo}
      MYSQL_USER: ${MYSQL_USER:-todo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-todo}
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      CORS_ALLOW_ALL_ORIGINS: ${CORS_ALLOW_ALL_ORIGINS:-1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8081}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-admin12345}
      RUN_SEED: ${RUN_SEED:-1}
      DJANGO_DEV: "1" # runserver: autoreload pega as mudanças do bind mount
    ports:
      - "8000:8000"
    volumes:
      # Código ao vivo; o autoreload do Django recarrega ao salvar.
      - ./backend:/app
      # Não vaza a venv do host para dentro do container.
      - /app/venv

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://localhost:8000}
      EXPO_NO_TELEMETRY: "1"
      # Mantemos o Metro em modo não-interativo (CI=1 da imagem): confiável em
      # container. Como o código é bind-mountado, o Metro reempacota a partir dos
      # arquivos do host — salve o arquivo e recarregue o navegador para ver a mudança.
    ports:
      - "8081:8081"
      - "19006:19006"
    volumes:
      # Código ao vivo para o app.
      - ./frontend:/app
      # Preserva o node_modules (linux) instalado na imagem, ignorando o do host.
      - /app/node_modules

volumes:
  mysql_data_mac:
